app:
  name: finsight-agent
  version: v1
  mode: skeleton
  control_plane:
    root: backend/src/finsight_agent/control_plane
    prompts:
      router_system_prompt_path: router/prompts/system.txt
      planner_system_prompt_path: planner/prompts/system.txt
  reporting:
    root: backend/src/finsight_agent/capabilities/reporting
    prompts:
      final_answer_writer_system_prompt_path: prompts/system.txt
  retrieval:
    manifest_path: var/data/corpus_manifests/semiconductor_sample_universe.yaml
    raw_filings_root: var/data/raw_filings
    parsed_filings_root: var/data/parsed_filings
    chunked_filings_root: var/data/chunked_filings
    retrieval_index_root: var/data/retrieval_index
    status_root: var/data/corpus_status
    dense:
      qdrant_collection_name: finsight_pdf_chunks_v1
      embedding_model_name: bge-m3
      embedding_model_version: bge-m3-v1
      qdrant_path: var/data/qdrant
    default_pilot_company_count: 10
    primary_parser_name: mineru
    parent_target_chars: 2000
    child_target_chars: 500
  workbench:
    mode: runnable
    backend_host: 127.0.0.1
    backend_port: 8000
    backend_base_url: http://127.0.0.1:8000
    frontend_host: 127.0.0.1
    frontend_port: 8501
